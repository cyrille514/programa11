<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Bases Numéricas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style type="text/tailwindcss">

  @import "tailwindcss";

   @layer base {

     :root {

      @apply text-sm;

       line-height: 1.5;
     }
  }
</style>

</head>
<body class="bg-[url('photo.jpg')] bg-cover bg-center bg-no-repeat w-full min-h-screen flex items-center justify-center min-h-screen p-4 sm:p-6 md:p-10">

    <main class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        
        <header class="text-center mb-5">
            <h1 class="text-2xl font-bold text-violet-600 tracking-tight">Conversor de Bases</h1>
            <p class="text-sm font-bold text-black mt-1">Convierte entre cualquier base numérica bidireccionalmente</p>
        </header>

        <!-- Formulario -->
        <form id="conversor-form" class="space-y-4" novalidate>
            
            <!-- Selector de Dirección de Conversión (Bidireccional) -->
            <div class="flex justify-between bg-slate-100 p-1 rounded-xl mb-2 border border-slate-200">
                <label class="flex-1 text-center py-2 rounded-lg text-xs font-semibold cursor-pointer has-[:checked]:bg-white has-[:checked]:text-blue-600 has-[:checked]:shadow-sm text-slate-600 transition-all">
                    <input type="radio" id="dir-a-base10" name="direccion" class="sr-only" checked>
                    Cualquier Base ➔ Base 10
                </label>
                <label class="flex-1 text-center py-2 rounded-lg text-xs font-semibold cursor-pointer has-[:checked]:bg-white has-[:checked]:text-blue-600 has-[:checked]:shadow-sm text-slate-600 transition-all">
                    <input type="radio" id="dir-desde-base10" name="direccion" class="sr-only">
                    Base 10 a Cualquier Base
                </label>
            </div>
            
            <!-- Campo: Número de Entrada -->
            <div>
                <label for="input-numero" class="block text-sm font-semibold text-slate-700 mb-1">
                    Número de origen
                </label>
                <input 
                    type="text" 
                    id="input-numero" 
                    placeholder="Ej. 100 " 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-800 uppercase focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                >
            </div>

            <!-- Campo: Base Numérica -->
            <div>
                <label for="input-base" class="block text-sm font-semibold text-slate-700 mb-1">
                    Base de origen
                </label>
                <input 
                    type="number" 
                    id="input-base" 
                    min="2" 
                    max="36" 
                    placeholder="Ej. 2 para binario" 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                >
            </div>

            <!-- Botón de Acción -->
            <button 
                type="submit" 
                id="btn-convertir" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors duration-200 shadow-md active:scale-[0.98]"
            >
                Calcular Conversión
            </button>

        </form>

        <!-- Sección Dinámica de Resultados -->
        <section id="contenedor-resultado" class="mt-6 p-4 rounded-xl border hidden transition-all duration-300">
            <p id="texto-resultado" class="text-center font-medium"></p>
        </section>

    </main>

    <!-- Enlace al archivo de lógica JavaScript -->
    <script src="./js/app.js"></script>
</body>
</html>
